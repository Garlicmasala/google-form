<!DOCTYPE html>
<html>
<head>
    <title>Survey - Page 1</title>
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>

<div style="text-align: right; margin-bottom: 20px;">
    <button onclick="switchLanguage()" style="background: #0277BD; padding: 8px 16px; color: white; border: none; border-radius: 4px; cursor: pointer;">切換語言</button>
</div>

<h2>资格检查</h2>

<form id="form1">

<h3>1. 年龄 18–45 岁?</h3>
<label><input type="radio" name="q1" value="yes" required> 是</label>
<label><input type="radio" name="q1" value="no"> 否</label>

<h3>2. 从事医学相关的学习/工作?</h3>
<label><input type="radio" name="q2" value="yes" required> 是</label>
<label><input type="radio" name="q2" value="no"> 否</label>

<h3>3. 患有慢性病?</h3>
<label><input type="radio" name="q3" value="yes" required> 是</label>
<label><input type="radio" name="q3" value="no"> 否</label>

<div class="button-group">
<button type="submit">下一步</button>
</div>

</form>

<script>
function switchLanguage() {
    const langs = ['en', 'zh-simple', 'zh-trad'];
    const currentLang = localStorage.getItem('preferredLanguage') || 'zh-simple';
    const currentIndex = langs.indexOf(currentLang);
    const nextIndex = (currentIndex + 1) % langs.length;
    localStorage.setItem('preferredLanguage', langs[nextIndex]);
    location.reload();
}

function navigateToPage(page) {
    const lang = localStorage.getItem('preferredLanguage') || 'zh-simple';
    const langSuffix = lang === 'en' ? '-en' : (lang === 'zh-trad' ? '-zh-trad' : '-zh-simple');
    const baseName = page.replace('.html', '');
    window.location.href = baseName + langSuffix + '.html';
}

window.addEventListener("DOMContentLoaded", function() {
    populateForm("form1");
});

document.getElementById("form1").onsubmit = function(e) {
    e.preventDefault();

    const q1 = document.querySelector('input[name="q1"]:checked');
    const q2 = document.querySelector('input[name="q2"]:checked');
    const q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
        alert("请回答所有问题。");
        return;
    }

    if (q1.value === "no" || q2.value === "yes" || q3.value === "yes") {
        alert("您不符合资格。谢谢。");
        return;
    }

    saveData({q1: q1.value, q2: q2.value, q3: q3.value});
    navigateToPage('page2.html');
};
</script>

</body>
</html>
