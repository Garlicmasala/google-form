<!DOCTYPE html>
<html>
<head>
    <title>Page 3</title>
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>

<h2>行为</h2>

<form id="form3">

<label>吃水果的天数 (0–7):</label>
<input type="number" name="fruit" min="0" max="7" required>

<br><br>

<label>吃蔬菜的天数 (0–7):</label>
<input type="number" name="veg" min="0" max="7" required>

<br><br>

<label>剧烈运动的天数:</label>
<input type="number" name="vig_days" min="0" required>

<br><br>

<label>每天分钟数 (剧烈运动):</label>
<input type="number" name="vig_minutes" min="0" required>

<br><br>

<label>过去一年内饮酒?</label>
<select name="alcohol" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<label>吸烟?</label>
<select name="smoke" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<div class="button-group">
<button type="button" onclick="window.location='page2.html'">返回</button>
<button type="submit">下一步</button>
</div>

</form>

<script>
window.addEventListener("DOMContentLoaded", function() {
    populateForm("form3");
});

document.getElementById("form3").onsubmit = function(e) {
    e.preventDefault();
    saveData(Object.fromEntries(new FormData(this).entries()));
    window.location.href = "page4.html";
};
</script>

</body>
</html>
