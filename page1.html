<!DOCTYPE html>
<html>
<head>
    <title>Survey - Page 1</title>
    <script src="data.js"></script>
</head>
<body>

<h2>Eligibility Check</h2>

<form id="form1">

<h3>1. Age 18–45?</h3>
<label><input type="radio" name="q1" value="yes" required> Yes</label>
<label><input type="radio" name="q1" value="no"> No</label>

<h3>2. Medical-related study/work?</h3>
<label><input type="radio" name="q2" value="yes" required> Yes</label>
<label><input type="radio" name="q2" value="no"> No</label>

<h3>3. Chronic disease?</h3>
<label><input type="radio" name="q3" value="yes" required> Yes</label>
<label><input type="radio" name="q3" value="no"> No</label>

<br><br>
<button type="submit">Next</button>

</form>

<script>
window.addEventListener("DOMContentLoaded", function() {
    populateForm("form1");
});

document.getElementById("form1").onsubmit = function(e) {
    e.preventDefault();

    const q1 = document.querySelector('input[name="q1"]:checked');
    const q2 = document.querySelector('input[name="q2"]:checked');
    const q3 = document.querySelector('input[name="q3"]:checked');

    if (!q1 || !q2 || !q3) {
        alert("Please answer all questions.");
        return;
    }

    if (q1.value === "no" || q2.value === "yes" || q3.value === "yes") {
        alert("You are not eligible. Thank you.");
        return;
    }

    saveData({q1: q1.value, q2: q2.value, q3: q3.value});
    window.location.href = "page2.html";
};
</script>

</body>
</html>
