<!DOCTYPE html>
<html>
<head>
    <title>第4頁</title>
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>

<div style="text-align: right; margin-bottom: 20px;">
    <button onclick="switchLanguage()" style="background: #0277BD; padding: 8px 16px; color: white; border: none; border-radius: 4px; cursor: pointer;">切換語言</button>
</div>

<h2>態度和篩查</h2>

<form id="form4">

<label>慢性病是可以預防的:</label>
<select name="att1" required>
<option value="Strongly agree">強烈同意</option>
<option value="Agree">同意</option>
<option value="Disagree">不同意</option>
<option value="Strongly disagree">強烈不同意</option>
</select>

<br><br>

<label>之前做過身體檢查?</label>
<select name="check" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<label>願意改善健康?</label>
<select name="willing" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<h3>人口統計信息</h3>

<label>教育:</label>
<select name="edu" required>
<option value="Primary or below">小學或以下</option>
<option value="Secondary">中學</option>
<option value="Tertiary">大學</option>
</select>

<br><br>

<label>婚姻狀況:</label>
<select name="marital" required>
<option value="Single">單身</option>
<option value="Married">已婚</option>
<option value="Divorced">離異</option>
</select>

<br><br>

<div class="button-group">
<button type="button" onclick="navigateToPage('page3.html')">返回</button>
<button type="submit">下一步</button>
</div>

</form>

<script>
function switchLanguage() {
    const langs = ['en', 'zh-simple', 'zh-trad'];
    const currentLang = localStorage.getItem('preferredLanguage') || 'zh-trad';
    const currentIndex = langs.indexOf(currentLang);
    const nextIndex = (currentIndex + 1) % langs.length;
    localStorage.setItem('preferredLanguage', langs[nextIndex]);
    location.reload();
}

function navigateToPage(page) {
    const lang = localStorage.getItem('preferredLanguage') || 'zh-trad';
    const langSuffix = lang === 'en' ? '-en' : (lang === 'zh-trad' ? '-zh-trad' : '-zh-simple');
    const baseName = page.replace('.html', '');
    window.location.href = baseName + langSuffix + '.html';
}

window.addEventListener("DOMContentLoaded", function() {
    populateForm("form4");
});

document.getElementById("form4").onsubmit = function(e) {
    e.preventDefault();
    saveData(Object.fromEntries(new FormData(this).entries()));
    navigateToPage('page5.html');
};
</script>

</body>
</html>
