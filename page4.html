<!DOCTYPE html>
<html>
<head>
    <title>Page 4</title>
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>

<h2>态度和筛查</h2>

<form id="form4">

<label>慢性病是可以预防的:</label>
<select name="att1" required>
<option value="Strongly agree">强烈同意</option>
<option value="Agree">同意</option>
<option value="Disagree">不同意</option>
<option value="Strongly disagree">强烈不同意</option>
</select>

<br><br>

<label>之前做过身体检查?</label>
<select name="check" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<label>愿意改善健康?</label>
<select name="willing" required>
<option value="Yes">是</option>
<option value="No">否</option>
</select>

<br><br>

<h3>人口统计信息</h3>

<label>教育:</label>
<select name="edu" required>
<option value="Primary or below">小学或以下</option>
<option value="Secondary">中学</option>
<option value="Tertiary">大学</option>
</select>

<br><br>

<label>婚姻状况:</label>
<select name="marital" required>
<option value="Single">单身</option>
<option value="Married">已婚</option>
<option value="Divorced">离异</option>
</select>

<br><br>

<div class="button-group">
<button type="button" onclick="window.location='page3.html'">返回</button>
<button type="submit">下一步</button>
</div>

</form>

<script>
window.addEventListener("DOMContentLoaded", function() {
    populateForm("form4");
});

document.getElementById("form4").onsubmit = function(e) {
    e.preventDefault();
    saveData(Object.fromEntries(new FormData(this).entries()));
    window.location.href = "page5.html";
};
</script>

</body>
</html>
