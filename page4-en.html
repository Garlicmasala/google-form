<!DOCTYPE html>
<html>
<head>
    <title>Page 4</title>
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>

<div style="text-align: right; margin-bottom: 20px;">
    <button onclick="switchLanguage()" style="background: #0277BD; padding: 8px 16px; color: white; border: none; border-radius: 4px; cursor: pointer;">Change Language</button>
</div>

<h2>Attitude & Screening</h2>

<form id="form4">

<label>Chronic diseases are preventable:</label>
<select name="att1" required>
<option value="Strongly agree">Strongly agree</option>
<option value="Agree">Agree</option>
<option value="Disagree">Disagree</option>
<option value="Strongly disagree">Strongly disagree</option>
</select>

<br><br>

<label>Have body check before?</label>
<select name="check" required>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<br><br>

<label>Willing to improve health?</label>
<select name="willing" required>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<br><br>

<h3>Demographics</h3>

<label>Education:</label>
<select name="edu" required>
<option value="Primary or below">Primary or below</option>
<option value="Secondary">Secondary</option>
<option value="Tertiary">Tertiary</option>
</select>

<br><br>

<label>Marital status:</label>
<select name="marital" required>
<option value="Single">Single</option>
<option value="Married">Married</option>
<option value="Divorced">Divorced</option>
</select>

<br><br>

<div class="button-group">
<button type="button" onclick="navigateToPage('page3.html')">Back</button>
<button type="submit">Next</button>
</div>

</form>

<script>
function switchLanguage() {
    const langs = ['en', 'zh-simple', 'zh-trad'];
    const currentLang = localStorage.getItem('preferredLanguage') || 'en';
    const currentIndex = langs.indexOf(currentLang);
    const nextIndex = (currentIndex + 1) % langs.length;
    localStorage.setItem('preferredLanguage', langs[nextIndex]);
    location.reload();
}

function navigateToPage(page) {
    const lang = localStorage.getItem('preferredLanguage') || 'en';
    const langSuffix = lang === 'en' ? '-en' : (lang === 'zh-trad' ? '-zh-trad' : '-zh-simple');
    const baseName = page.replace('.html', '');
    window.location.href = baseName + langSuffix + '.html';
}

window.addEventListener("DOMContentLoaded", function() {
    populateForm("form4");
});

document.getElementById("form4").onsubmit = function(e) {
    e.preventDefault();
    saveData(Object.fromEntries(new FormData(this).entries()));
    navigateToPage('page5.html');
};
</script>

</body>
</html>
